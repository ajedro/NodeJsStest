<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login Form</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .error-msg { color: red; font-size: 14px; margin-top: 10px; display: none; }
        .success-msg { color: green; font-size: 14px; margin-top: 10px; display: none; }
        .link-container { margin-top: 15px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Login</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="username">Email</label>
            <input type="email" id="username" required placeholder="Enter email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Enter password">
        </div>
        <button type="submit">Log In</button>
        <div id="error" class="error-msg"></div>
        <div id="success" class="success-msg"></div>
    </form>
    <div class="link-container">
        <a href="register.html">¿No tienes cuenta? Registrate aquí</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(event) {
        event.preventDefault(); 
        
        const correo = document.getElementById('username').value;
        const contraseña = document.getElementById('password').value;
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        try {
            const respuesta = await fetch('https://nodejsstest2.onrender.com/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ correo, contraseña })
            });

            const resultado = await respuesta.json();

            if (respuesta.ok) {
                successDiv.textContent = resultado.mensaje;
                successDiv.style.display = 'block';
                alert("¡Login exitoso!");
            } else {
                errorDiv.textContent = resultado.error;
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            errorDiv.textContent = "Error al conectar con el servidor.";
            errorDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
